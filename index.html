<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Gap-Fill Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:30px;
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

h1{
    text-align:center;
    font-size:2.8rem;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:0.8;
    margin-bottom:35px;
}

.panel{
    max-width:1300px;
    margin:auto;
    background:rgba(255,255,255,0.08);
    border-radius:24px;
    padding:25px;
    backdrop-filter:blur(10px);
}

textarea{
    width:100%;
    height:220px;
    border:none;
    border-radius:18px;
    padding:18px;
    resize:vertical;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:1rem;
    line-height:1.8;
    outline:none;
}

.preview{
    margin-top:30px;
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:18px;
    line-height:2.2;
    white-space:pre-wrap;
    word-break:normal;
}

.gap-highlight{

    display:inline-flex;
    align-items:center;

    background:#2563eb;
    padding:2px 6px;

    border-radius:6px;

    white-space:nowrap;

    vertical-align:middle;

    font-weight:bold;

    transition:0.2s;

}

.gap-highlight:hover{
    background:#3b82f6;
}

.gap-main{
    cursor:pointer;
}

.gap-icon{

    margin-left:5px;

    cursor:pointer;

    font-size:0.85rem;

    opacity:0.9;

    transition:0.2s;

}

.gap-icon:hover{
    transform:scale(1.15);
}

.controls{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    border:none;
    padding:14px 20px;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
    transition:0.25s;
}

.primary{
    background:#3b82f6;
    color:white;
}

.primary:hover{
    background:#2563eb;
}

.green{
    background:#10b981;
    color:white;
}

.green:hover{
    background:#059669;
}

.secondary{
    background:rgba(255,255,255,0.1);
    color:white;
}

.secondary:hover{
    background:rgba(255,255,255,0.18);
}

.hidden{
    display:none !important;
}

.exercise{
    margin-top:20px;
    line-height:3;
    font-size:1.08rem;
}

.gap-input,
.gap-select{
    min-width:150px;
    padding:10px;
    border-radius:10px;
    border:2px solid #60a5fa;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:1rem;
}

.gap-select option{
    background:#1e293b;
    color:white;
}

.correct{
    border-color:#10b981 !important;
    background:rgba(16,185,129,0.2) !important;
}

.incorrect{
    border-color:#ef4444 !important;
    background:rgba(239,68,68,0.2) !important;
}

.info-icon{
    margin-left:5px;
    position:relative;
    cursor:pointer;
}

.tooltip{
    visibility:hidden;
    opacity:0;

    position:absolute;
    bottom:140%;
    left:50%;

    transform:translateX(-50%);

    background:#111827;

    padding:10px;
    border-radius:10px;

    white-space:nowrap;

    transition:0.2s;

    font-size:0.85rem;
}

.info-icon:hover .tooltip{
    visibility:visible;
    opacity:1;
}

.stats{
    margin-top:20px;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,0.08);
}

.modal{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.7);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:999;
}

.modal-content{

    width:420px;

    background:#0f172a;

    padding:25px;

    border-radius:20px;

}

.modal-content input,
.modal-content select{

    width:100%;

    margin-top:12px;

    padding:12px;

    border:none;

    border-radius:10px;

    background:rgba(255,255,255,0.08);

    color:white;

}

.modal-buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.modal-buttons button{
    flex:1;
}

.top-bar{
    display:flex;
    gap:12px;
    margin-bottom:20px;
}

.top-bar input{
    flex:1;

    padding:12px;

    border:none;

    border-radius:12px;

    background:rgba(255,255,255,0.08);

    color:white;
}

</style>
</head>

<body>

<h1>Advanced Gap-Fill Builder</h1>

<p class="subtitle">
Select any letters or words directly with your cursor.
</p>

<!-- EDITOR -->

<div id="editorSection" class="panel">

<div class="top-bar">

<input
    type="text"
    id="exerciseName"
    placeholder="Exercise name..."
>

<button
    class="secondary"
    onclick="saveExercise()"
>
Save
</button>

<button
    class="secondary"
    onclick="loadExercise()"
>
Load
</button>

</div>

<textarea id="sourceText">
Last summer, Emily was walking near the beach when she saw an old castle in the distance.
</textarea>

<div class="controls">

<button
    class="primary"
    onclick="loadText()"
>
Load Text
</button>

<button
    class="green"
    onclick="buildExercise()"
>
Build Exercise
</button>

</div>

<div
    id="preview"
    class="preview"
    onmouseup="captureSelection()"
></div>

</div>

<!-- EXERCISE -->

<div
    id="exerciseSection"
    class="panel hidden"
>

<h2>Exercise</h2>

<div
    id="exerciseOutput"
    class="exercise"
></div>

<div class="controls">

<button
    class="green"
    onclick="checkAnswers()"
>
Check Answers
</button>

<button
    class="secondary"
    onclick="showAnswers()"
>
Show Answers
</button>

<button
    class="primary"
    onclick="backToEditor()"
>
Back To Editor
</button>

</div>

<div
    id="stats"
    class="stats"
>
Score: 0 / 0
</div>

<div id="answersOutput"></div>

</div>

<!-- MODAL -->

<div
    id="modal"
    class="modal hidden"
>

<div class="modal-content">

<h3>Edit Gap</h3>

<select
    id="gapType"
    onchange="toggleDropdownOptions()"
>

<option value="input">
Typing Gap
</option>

<option value="dropdown">
Dropdown Gap
</option>

</select>

<input
    type="text"
    id="gapHint"
    placeholder="Hint"
>

<div
    id="dropdownOptions"
    class="hidden"
>

<input
    type="text"
    id="correctOption"
    placeholder="Correct option"
>

<input
    type="text"
    id="wrongOption1"
    placeholder="Wrong option"
>

<input
    type="text"
    id="wrongOption2"
    placeholder="Wrong option"
>

</div>

<div class="modal-buttons">

<button
    class="secondary"
    onclick="closeModal()"
>
Close
</button>

<button
    class="green"
    onclick="saveGapSettings()"
>
Save Gap
</button>

</div>

</div>

</div>

<script>

let originalText = "";
let gaps = [];
let currentGapIndex = null;

function loadText(){

    originalText =
        document.getElementById("sourceText")
        .value;

    gaps = [];

    renderPreview();

}

function escapeRegExp(string){

    return string.replace(
        /[.*+?^${}()|[\]\\]/g,
        '\\$&'
    );

}

function renderPreview(){

    let html = originalText;

    gaps.forEach((gap,index)=>{

        const safeText =
            escapeRegExp(gap.text);

        html = html.replace(

            new RegExp(safeText),

            `

            <span class="gap-highlight">

                <span
                    class="gap-main"
                    onclick="openGapEditor(${index})"
                >
                    ${gap.text}
                </span>

                <span
                    class="gap-icon"
                    onclick="openGapEditor(${index})"
                    title="Edit gap"
                >
                    ✏️
                </span>

                <span
                    class="gap-icon"
                    onclick="deleteGap(${index})"
                    title="Delete gap"
                >
                    ❌
                </span>

            </span>

            `

        );

    });

    document.getElementById("preview")
        .innerHTML = html;

}

function captureSelection(){

    const selection =
        window.getSelection().toString();

    if(!selection.trim()) return;

    const exists =
        gaps.find(g=>g.text===selection);

    if(exists){

        window.getSelection()
            .removeAllRanges();

        return;

    }

    gaps.push({

        text:selection,
        hint:"",
        type:"input",
        options:["","",""]

    });

    renderPreview();

    window.getSelection()
        .removeAllRanges();

}

function deleteGap(index){

    const confirmDelete =
        confirm("Delete this gap?");

    if(!confirmDelete) return;

    gaps.splice(index,1);

    renderPreview();

}

function openGapEditor(index){

    currentGapIndex = index;

    const gap = gaps[index];

    document.getElementById("gapType")
        .value = gap.type || "input";

    document.getElementById("gapHint")
        .value = gap.hint || "";

    document.getElementById("correctOption")
        .value = gap.options[0] || "";

    document.getElementById("wrongOption1")
        .value = gap.options[1] || "";

    document.getElementById("wrongOption2")
        .value = gap.options[2] || "";

    toggleDropdownOptions();

    document.getElementById("modal")
        .classList.remove("hidden");

}

function toggleDropdownOptions(){

    const type =
        document.getElementById("gapType")
        .value;

    const box =
        document.getElementById("dropdownOptions");

    if(type==="dropdown"){

        box.classList.remove("hidden");

    }else{

        box.classList.add("hidden");

    }

}

function saveGapSettings(){

    const gap = gaps[currentGapIndex];

    gap.type =
        document.getElementById("gapType")
        .value;

    gap.hint =
        document.getElementById("gapHint")
        .value;

    gap.options[0] =
        document.getElementById("correctOption")
        .value;

    gap.options[1] =
        document.getElementById("wrongOption1")
        .value;

    gap.options[2] =
        document.getElementById("wrongOption2")
        .value;

    closeModal();

}

function closeModal(){

    document.getElementById("modal")
        .classList.add("hidden");

}

function buildExercise(){

    document.getElementById("editorSection")
        .classList.add("hidden");

    document.getElementById("exerciseSection")
        .classList.remove("hidden");

    let text = originalText;

    gaps.forEach((gap,index)=>{

        let replacement = "";

        if(gap.type==="input"){

            replacement = `

            <span>

                <input
                    class="gap-input"
                    id="gap-${index}"
                >

                ${
                    gap.hint
                    ? `
                    <span class="info-icon">
                        ℹ️
                        <span class="tooltip">
                            ${gap.hint}
                        </span>
                    </span>
                    `
                    : ""
                }

            </span>

            `;

        }else{

            let options = [...gap.options];

            options.sort(()=>Math.random()-0.5);

            replacement = `

            <span>

                <select
                    class="gap-select"
                    id="gap-${index}"
                >

                    <option value="">
                        Choose...
                    </option>

                    ${
                        options.map(option=>

                            `<option value="${option}">
                                ${option}
                            </option>`

                        ).join("")
                    }

                </select>

                ${
                    gap.hint
                    ? `
                    <span class="info-icon">
                        ℹ️
                        <span class="tooltip">
                            ${gap.hint}
                        </span>
                    </span>
                    `
                    : ""
                }

            </span>

            `;

        }

        const safeText =
            escapeRegExp(gap.text);

        text = text.replace(
            new RegExp(safeText),
            replacement
        );

    });

    document.getElementById("exerciseOutput")
        .innerHTML = text;

    document.getElementById("stats")
        .innerHTML =
        `Score: 0 / ${gaps.length} (0%)`;

}

function checkAnswers(){

    let score = 0;

    gaps.forEach((gap,index)=>{

        const element =
            document.getElementById(`gap-${index}`);

        const user =
            element.value
            .trim()
            .toLowerCase();

        let correct;

        if(gap.type==="input"){

            correct =
                gap.text.toLowerCase();

        }else{

            correct =
                gap.options[0]
                .toLowerCase();

        }

        element.classList.remove(
            "correct",
            "incorrect"
        );

        if(user===correct){

            element.classList.add("correct");

            score++;

        }else{

            element.classList.add("incorrect");

        }

    });

    const percentage =
        Math.round(
            (score/gaps.length)*100
        );

    document.getElementById("stats")
        .innerHTML =

        `<strong>Score:</strong>
        ${score} / ${gaps.length}
        (${percentage}%)`;

}

function showAnswers(){

    let html = "<h3>Answer Key</h3>";

    gaps.forEach((gap,index)=>{

        const answer =
            gap.type==="input"
            ? gap.text
            : gap.options[0];

        html += `

        <div style="margin-bottom:10px;">

            <strong>${index+1}.</strong>
            ${answer}

        </div>

        `;

    });

    document.getElementById("answersOutput")
        .innerHTML = html;

}

function backToEditor(){

    document.getElementById("exerciseSection")
        .classList.add("hidden");

    document.getElementById("editorSection")
        .classList.remove("hidden");

}

function saveExercise(){

    const name =
        document.getElementById("exerciseName")
        .value;

    if(!name){

        alert("Please enter a name.");
        return;

    }

    localStorage.setItem(

        "gapfill_"+name,

        JSON.stringify({

            text:originalText,
            gaps:gaps

        })

    );

    alert("Exercise saved!");

}

function loadExercise(){

    const name =
        document.getElementById("exerciseName")
        .value;

    const saved =
        localStorage.getItem(
            "gapfill_"+name
        );

    if(!saved){

        alert("Exercise not found.");
        return;

    }

    const data = JSON.parse(saved);

    originalText = data.text;

    gaps = data.gaps;

    document.getElementById("sourceText")
        .value = originalText;

    renderPreview();

    alert("Exercise loaded!");

}

loadText();

</script>

</body>
</html>
